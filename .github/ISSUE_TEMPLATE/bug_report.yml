name: 🐛 Bug Report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: The app crashes when I tap "Send Reminder Now"...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Go to the Quotes tab
        3. Tap the heart icon on a quote
        4. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: Found in Settings → About, or the APK filename you downloaded
      placeholder: v1.1.1
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / Android version
      placeholder: Pixel 7, Android 14
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Screenshots or extra context
      description: Drag and drop screenshots here if you have them.
    validations:
      required: false
