name: Build & Release Android APK

# Builds a signed, installable Android APK for the Expo/React Native app and
# publishes it as a GitHub Release with the APK attached, so users can
# download and sideload it directly from the Releases page.
#
# Trigger by pushing a tag like `v1.1.0`, or run manually from the Actions tab.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build/publish (e.g. v1.1.0)'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: yarn install

      - name: Generate native Android project
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ vars.EXPO_PUBLIC_BACKEND_URL }}
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          cp "$APK_PATH" "digital-wellbeing-${{ steps.tag.outputs.tag }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: digital-wellbeing-apk
          path: frontend/digital-wellbeing-${{ steps.tag.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Digital Wellbeing ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: frontend/digital-wellbeing-${{ steps.tag.outputs.tag }}.apk
          body: |
            ## 📱 Digital Wellbeing ${{ steps.tag.outputs.tag }}

            ### Install
            1. Download `digital-wellbeing-${{ steps.tag.outputs.tag }}.apk` below.
            2. On your Android device, enable "Install from unknown sources" if prompted.
            3. Open the downloaded APK to install.

            This build works fully offline out of the box (100+ built-in quotes across
            10 categories). AI-generated reminders activate automatically if a backend
            URL was configured at build time.

            _Note: this is a debug-signed build intended for direct sideloading, not a
            Play Store release. If you need a Play Store-ready build, use `eas build`
            with your own signing credentials._
